services:
  app:
    build: .
    container_name: tkinter-app-dev
    volumes:
      - .:/app
    environment:
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=${XAUTHORITY}
    network_mode: host
    stdin_open: true
    tty: true

  shell:
    build: .
    container_name: tkinter-app-shell
    volumes:
      - .:/app
    environment:
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=${XAUTHORITY}
    network_mode: host
    stdin_open: true
    tty: true
    command: /bin/bash
