services:
  app:
    build:
      context: .
      # optional: name the image so Docker reuses the layer cache
      cache_from:
        - pulmorisk:latest
    image: pulmorisk:latest
    container_name: pulmorisk-dev
    volumes:
      - .:/app
    environment:
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=${XAUTHORITY}
    network_mode: host
    stdin_open: true
    tty: true

  shell:
    image: pulmorisk:latest
    container_name: pulmorisk-shell
    volumes:
      - .:/app
    environment:
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=${XAUTHORITY}
    network_mode: host
    stdin_open: true
    tty: true
    command: /bin/bash
